{% extends "base.html" %}
{% block title %}Изменение породы{% endblock title %}
{% block content %}
<h1>Форма для изменения породы</h1>
<form action="/editbreed/" method="post">
    {% csrf_token %}
    <input type="hidden" name="id" value="{{id}}">
    <input type="text" name="title" value="{{oldName}}">
    <input type="submit" value="Сохранить">
</form>
<a href="/deletebreed/{{id}}">Удалить породу</a>
{% endblock content %}
